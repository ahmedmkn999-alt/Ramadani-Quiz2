<style>
:root{
  --gold:#C9A84C;--gold2:#F0C96B;--gold3:#8B6010;
  --ember:#FF4500;--ember2:#FF6B00;--ember3:#FFB347;
  --green:#10B981;--red:#EF4444;--blue:#3B82F6;--purple:#7C3AED;
  --bg:#000008;--card:rgba(12,5,2,0.85);
}
*{box-sizing:border-box;margin:0;padding:0;}
*{cursor:none!important;}
#cursor{position:fixed;width:20px;height:20px;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);}
#cursor-ring{position:fixed;width:40px;height:40px;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);border:1.5px solid rgba(201,168,76,0.5);border-radius:50%;transition:all 0.12s ease;}

body{font-family:'Cairo',sans-serif;background:var(--bg);color:white;overflow-x:hidden;}

/* BG */
.ramadan-bg{
  position:fixed;inset:-10%;z-index:-2;
  background-image:linear-gradient(to bottom,rgba(0,0,8,0.88),rgba(0,0,4,0.97)),url('https://i.postimg.cc/TpjGQ5xs/image.jpg');
  background-size:cover;background-position:center;
  animation:panBg 25s infinite alternate ease-in-out;
}
@keyframes panBg{0%{transform:scale(1)translate(0,0)}50%{transform:scale(1.06)translate(-1%,1%)}100%{transform:scale(1.12)translate(1%,-1%)}}

/* CANVAS stars */
#starsCanvas{position:fixed;inset:0;z-index:-1;pointer-events:none;}

/* FIRE PARTICLES edges */
.fire-p{position:fixed;border-radius:50%;pointer-events:none;z-index:1;animation:fireRise var(--fr,2s) ease-out var(--fd,0s) infinite;bottom:0;left:var(--fl,50%);width:var(--fs,5px);height:var(--fs,5px);background:radial-gradient(circle,#fff 0%,var(--ember2) 40%,var(--ember) 80%,transparent 100%);}
@keyframes fireRise{0%{transform:translateY(0) scale(1);opacity:0.9;}50%{transform:translateY(-50vh) translateX(var(--fx,20px)) scale(0.5);opacity:0.5;}100%{transform:translateY(-90vh) translateX(var(--fx2,40px)) scale(0;opacity:0;}}

/* LANTERNS */
.lantern-wrap{position:fixed;top:0;z-index:200;pointer-events:none;}
.lantern-wrap.r{right:10px;transform-origin:top center;animation:swR 3.5s ease-in-out infinite;}
.lantern-wrap.l{left:10px;transform-origin:top center;animation:swL 3.2s ease-in-out infinite;}
@keyframes swR{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
@keyframes swL{0%,100%{transform:rotate(8deg)}50%{transform:rotate(-8deg)}}
.l-wire{width:1px;height:44px;background:linear-gradient(to bottom,rgba(201,168,76,0.6),transparent);margin:0 auto;}
.l-cap{width:22px;height:7px;background:linear-gradient(180deg,var(--gold2),var(--gold3));border-radius:3px 3px 0 0;margin:0 auto;}
.l-body{width:22px;height:32px;margin:0 auto;background:linear-gradient(180deg,rgba(255,220,100,0.95),rgba(201,168,76,0.7));border-radius:4px 4px 9px 9px;position:relative;overflow:hidden;animation:lGlow 2.5s ease-in-out infinite;}
.l-body::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);}
.l-tail{width:1px;height:9px;background:rgba(201,168,76,0.4);margin:0 auto;}
@keyframes lGlow{0%,100%{box-shadow:0 0 14px 5px rgba(255,180,0,0.7),0 0 30px rgba(255,150,0,0.4);}50%{box-shadow:0 0 22px 9px rgba(255,200,0,0.95),0 0 50px rgba(255,100,0,0.6);}}

/* TOP BAR */
.top-bar{
  background:linear-gradient(135deg,rgba(0,0,8,0.96),rgba(10,4,0,0.94));
  border-bottom:1px solid rgba(201,168,76,0.15);
  backdrop-filter:blur(24px);
  position:fixed;top:0;left:0;width:100%;z-index:100;
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;
}
.pw-pill{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:999px;transition:all 0.2s;}
.pw-pill.freeze{background:rgba(30,58,138,0.35);border:1px solid rgba(59,130,246,0.3);}
.pw-pill.fifty{background:rgba(76,29,149,0.35);border:1px solid rgba(147,51,234,0.3);}
.pw-pill:hover{transform:scale(1.05);}
.pw-pill span{font-weight:900;font-size:13px;}
.pw-pill i{font-size:11px;}
.logout-btn{display:flex;align-items:center;gap:5px;color:#F87171;font-size:12px;font-weight:700;background:rgba(127,29,29,0.22);border:1px solid rgba(239,68,68,0.28);padding:6px 13px;border-radius:999px;transition:all 0.2s;}
.logout-btn:hover{background:rgba(127,29,29,0.45);transform:scale(1.03);}

/* PLAYER CARD */
.player-card{
  background:linear-gradient(135deg,rgba(16,6,2,0.88),rgba(8,3,0,0.94));
  border:1px solid rgba(201,168,76,0.3);border-radius:22px;
  backdrop-filter:blur(20px);position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.7),0 0 0 1px rgba(201,168,76,0.04) inset,0 0 40px rgba(255,69,0,0.05);
  transition:transform 0.3s,box-shadow 0.3s;
  animation:slideDown 0.6s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes slideDown{from{transform:translateY(-30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.player-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold2),var(--ember3),var(--gold2),transparent);}
.player-card:hover{transform:translateY(-2px);box-shadow:0 16px 50px rgba(0,0,0,0.8),0 0 50px rgba(201,168,76,0.08);}

/* HOLOGRAPHIC SHIMMER */
.holo-shimmer{
  position:absolute;inset:0;border-radius:22px;pointer-events:none;
  background:linear-gradient(105deg,transparent 40%,rgba(201,168,76,0.04) 50%,rgba(255,107,0,0.03) 60%,transparent 70%);
  background-size:200% 200%;
  animation:holoMove 4s ease-in-out infinite;
}
@keyframes holoMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

.score-pill{background:linear-gradient(135deg,rgba(201,168,76,0.12),rgba(255,69,0,0.06));border:1px solid rgba(201,168,76,0.3);border-radius:16px;padding:10px 14px;text-align:center;min-width:70px;}
.score-animated{transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);}

/* WHEEL BTN */
.wheel-zone{display:flex;justify-content:center;position:relative;padding-bottom:20px;}
.wheel-btn{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,rgba(16,6,2,0.95),rgba(8,3,0,0.98));
  border:2px solid rgba(201,168,76,0.5);
  display:flex;align-items:center;justify-content:center;
  cursor:none;position:relative;
  box-shadow:0 0 0 0 rgba(201,168,76,0.5);
  animation:wheelPulse 2.5s ease-in-out infinite;
  transition:transform 0.3s;
}
.wheel-btn:hover{transform:scale(1.1) rotate(15deg);}
.wheel-btn:hover .wheel-icon{transform:rotate(360deg);}
.wheel-icon{font-size:40px;color:var(--gold2);transition:transform 0.8s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes wheelPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.5),0 0 20px rgba(201,168,76,0.15);}
  50%{box-shadow:0 0 0 14px rgba(201,168,76,0),0 0 35px rgba(201,168,76,0.25);}
}
.streak-badge{position:absolute;top:-8px;right:-8px;background:linear-gradient(135deg,var(--ember),var(--ember2));color:white;font-weight:900;font-size:11px;padding:3px 8px;border-radius:999px;border:2px solid var(--bg);box-shadow:0 2px 8px rgba(255,69,0,0.5);}
.wheel-label{position:absolute;bottom:0;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,var(--gold3),var(--gold2),var(--ember3));padding:3px 14px;border-radius:999px;font-size:11px;font-weight:900;color:#0a0300;white-space:nowrap;box-shadow:0 2px 12px rgba(201,168,76,0.4);}

/* TABS */
.tabs-wrap{display:flex;background:rgba(4,2,0,0.8);padding:5px;border-radius:18px;border:1px solid rgba(255,255,255,0.04);animation:slideDown 0.8s ease both;}
.tab-btn{flex:1;padding:11px;border-radius:14px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;border:none;color:rgba(255,255,255,0.45);background:none;transition:all .3s;cursor:none;}
.tab-btn.active{background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));color:#0a0300;font-weight:900;box-shadow:0 3px 18px rgba(201,168,76,0.45);}
.tab-btn:not(.active):hover{color:rgba(255,255,255,0.85);}

/* DAY CARDS */
.day-done{
  background:linear-gradient(135deg,rgba(6,78,59,0.25),rgba(5,46,22,0.4));
  border:1px solid rgba(34,197,94,0.22);border-right:3px solid rgba(34,197,94,0.7);
  border-radius:16px;padding:14px 16px;
  display:flex;justify-content:space-between;align-items:center;
  transition:all .3s;animation:cardIn var(--delay,0s) both;
}
.day-done:hover{transform:translateX(-4px);border-right-color:rgba(34,197,94,1);box-shadow:0 4px 20px rgba(0,0,0,0.4);}

.day-active{
  background:linear-gradient(135deg,rgba(201,168,76,0.14),rgba(255,69,0,0.06));
  border:1.5px solid rgba(201,168,76,0.7);border-radius:16px;padding:16px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:none;animation:activePulse 2s infinite,cardIn 0.3s both;
  transition:transform .3s,box-shadow .3s;position:relative;overflow:hidden;
}
.day-active::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(201,168,76,0.05) 50%,transparent 60%);animation:cardShimmer 2s ease-in-out infinite;}
@keyframes cardShimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
.day-active:hover{transform:scale(1.02);box-shadow:0 8px 30px rgba(201,168,76,0.25);}
@keyframes activePulse{0%{box-shadow:0 0 0 0 rgba(201,168,76,0.6)}70%{box-shadow:0 0 0 16px rgba(201,168,76,0)}100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}}

.day-locked{background:rgba(4,2,0,0.4);border:1px solid rgba(255,255,255,0.04);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;}

@keyframes cardIn{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* GLASS CARD */
.glass-card{background:rgba(12,5,2,0.75);border:1px solid rgba(201,168,76,0.18);backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.7);}

/* QUIZ OVERLAY */
#quiz-overlay{position:fixed;inset:0;background:rgba(0,0,8,0.98);z-index:2147483647!important;display:none;align-items:center;justify-content:center;padding:10px;}
.quiz-box{width:100%;max-width:460px;background:linear-gradient(145deg,rgba(12,5,2,0.98),rgba(4,2,0,0.99));border:1px solid rgba(201,168,76,0.35);border-radius:22px;padding:22px;box-shadow:0 30px 80px rgba(0,0,0,0.95),0 0 50px rgba(255,69,0,0.06);}

/* TIMER SHAKE */
@keyframes timerShake{0%,100%{transform:translateX(0);}10%,30%,50%,70%,90%{transform:translateX(-4px);}20%,40%,60%,80%{transform:translateX(4px);}}
.timer-danger{animation:timerShake 0.3s ease infinite!important;}
@keyframes screenFlash{0%{background:rgba(239,68,68,0.15);}100%{background:transparent;}}
.flash-red{animation:screenFlash 0.3s ease forwards;}
@keyframes screenFlashGreen{0%{background:rgba(34,197,94,0.15);}100%{background:transparent;}}
.flash-green{animation:screenFlashGreen 0.3s ease forwards;}

/* AC MODAL */
#ac-modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:99999999;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(12px);}
#ac-modal.show{display:flex;}
.ac-box{background:linear-gradient(145deg,rgba(25,4,4,0.98),rgba(12,2,2,0.99));border:1.5px solid rgba(239,68,68,0.5);border-radius:24px;padding:32px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 0 80px rgba(239,68,68,0.2),0 30px 60px rgba(0,0,0,0.9);animation:boxPop .4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes boxPop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.ac-icon{font-size:64px;margin-bottom:12px;display:block;animation:iconShake .5s ease .3s both;}
@keyframes iconShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.ac-btn{width:100%;padding:13px;border-radius:14px;border:none;cursor:none;font-family:'Cairo',sans-serif;font-weight:900;font-size:15px;transition:all .2s;margin-top:10px;}
.ac-btn:hover{transform:scale(1.03);}
.ac-btn.green{background:linear-gradient(135deg,#16a34a,#15803d);color:white;box-shadow:0 4px 14px rgba(22,163,74,.4);}
.ac-btn.red{background:linear-gradient(135deg,#991b1b,#7f1d1d);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}

/* CUSTOM ALERT */
#custom-alert{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999999;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px);}
.alert-inner{background:linear-gradient(145deg,rgba(16,6,2,0.97),rgba(8,3,0,0.99));border:1px solid rgba(201,168,76,0.3);border-radius:24px;padding:28px 22px;width:100%;max-width:340px;text-align:center;}

/* SPIN OVERLAY */
#spin-overlay{position:fixed;inset:0;background:rgba(0,0,8,0.97);z-index:99999;flex-direction:column;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(20px);}
.spin-card{background:linear-gradient(145deg,rgba(16,6,2,0.97),rgba(8,3,0,0.99));border:1.5px solid rgba(201,168,76,0.45);border-radius:28px;padding:28px 24px;width:100%;max-width:340px;text-align:center;position:relative;overflow:hidden;box-shadow:0 0 80px rgba(201,168,76,0.12),0 40px 80px rgba(0,0,0,0.9);}
.spin-card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),var(--ember3),var(--gold2),transparent);}
.legendary-wheel{background:conic-gradient(rgba(6,78,59,.9) 0 60deg,rgba(120,53,15,.9) 60deg 120deg,rgba(30,58,138,.9) 120deg 180deg,rgba(76,29,149,.9) 180deg 240deg,rgba(127,29,29,.9) 240deg 300deg,rgba(15,5,0,.9) 300deg 360deg);border-radius:50%;border:6px solid var(--gold);box-shadow:0 0 60px rgba(201,168,76,0.5),0 0 30px rgba(255,69,0,0.2),inset 0 0 40px rgba(0,0,0,.9);position:relative;}

/* NIGHT Q */
.night-star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:starTw 2.5s ease-in-out infinite;}
@keyframes starTw{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.8)}}
@keyframes moonPulse{0%,100%{box-shadow:0 0 24px rgba(139,92,246,0.35)}50%{box-shadow:0 0 40px rgba(139,92,246,0.65)}}

/* LEADERBOARD */
.lb-item{display:flex;align-items:center;gap:12px;background:rgba(4,2,0,0.5);border:1px solid rgba(255,255,255,0.05);border-radius:14px;padding:12px 14px;transition:all 0.25s;animation:cardIn 0.4s ease both;}
.lb-item:hover{border-color:rgba(201,168,76,0.2);background:rgba(16,6,2,0.7);transform:translateX(-3px);}
.lb-rank{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0;}
.lb-rank.gold{background:linear-gradient(135deg,var(--gold3),var(--gold2));color:#0a0300;box-shadow:0 2px 10px rgba(201,168,76,0.5);}
.lb-rank.silver{background:linear-gradient(135deg,#4B5563,#9CA3AF);color:#0a0300;}
.lb-rank.bronze{background:linear-gradient(135deg,#92400E,#D97706);color:white;}
.lb-rank.other{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4);}

body.hide-ads #main-ui,body.hide-ads iframe,body.hide-ads ins{display:none!important;}
body.hide-ads{overflow:hidden!important;background:var(--bg)!important;}
.logo-fix{object-fit:cover;border-radius:50%;background:#000;}
</style>
</head>
<body class="relative">

<!-- CURSOR -->
<div id="cursor"><svg width="20" height="20" viewBox="0 0 20 20"><polygon points="10,1 12,7 18,7 13,11 15,17 10,13 5,17 7,11 2,7 8,7" fill="none" stroke="#F0C96B" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
<div id="cursor-ring"></div>

<div class="ramadan-bg"></div>
<canvas id="starsCanvas"></canvas>

<!-- FIRE PARTICLES -->
<div class="fire-p" style="--fl:5%;--fs:4px;--fr:3s;--fd:0s;--fx:25px;--fx2:50px;"></div>
<div class="fire-p" style="--fl:95%;--fs:5px;--fr:2.5s;--fd:0.8s;--fx:-30px;--fx2:-60px;"></div>
<div class="fire-p" style="--fl:50%;--fs:3px;--fr:4s;--fd:1.5s;--fx:20px;--fx2:40px;"></div>

<!-- LANTERNS -->
<div class="lantern-wrap r"><div class="l-wire"></div><div class="l-cap"></div><div class="l-body"></div><div class="l-tail"></div></div>
<div class="lantern-wrap l"><div class="l-wire"></div><div class="l-cap"></div><div class="l-body"></div><div class="l-tail"></div></div>

<!-- AC MODAL -->
<div id="ac-modal">
  <div class="ac-box">
    <span class="ac-icon">🚨</span>
    <h2 style="color:#ef4444;font-size:22px;font-weight:900;margin-bottom:8px;">تحذير!</h2>
    <p id="ac-msg" style="color:#fca5a5;font-size:14px;font-weight:700;line-height:1.75;margin-bottom:4px;">حاولت الخروج من الكويز!</p>
    <p style="color:#f87171;font-size:12px;font-weight:700;margin-bottom:18px;">النقاط محتسبة حتى هذه اللحظة.</p>
    <button class="ac-btn green" onclick="acContinue()">✅ أكمل الكويز</button>
    <button class="ac-btn red" onclick="acExit()">خروج (النقاط ستُحسب) 🚪</button>
  </div>
</div>

<!-- CUSTOM ALERT -->
<div id="custom-alert" style="display:none;" class="fixed inset-0 z-50000 items-center justify-center p-4">
  <div class="alert-inner" id="alert-box" style="transform:scale(0.9);transition:transform 0.25s cubic-bezier(0.175,0.885,0.32,1.275);">
    <div id="alert-icon" style="font-size:52px;margin-bottom:12px;"></div>
    <h3 id="alert-title" style="font-size:22px;font-weight:900;margin-bottom:8px;color:var(--gold2);"></h3>
    <p id="alert-msg" style="color:rgba(255,255,255,0.5);font-weight:700;font-size:13px;margin-bottom:20px;line-height:1.7;"></p>
    <button onclick="closeCustomAlert()" style="width:100%;padding:14px;border:none;border-radius:13px;cursor:none;font-family:'Cairo',sans-serif;font-weight:900;font-size:15px;background:linear-gradient(135deg,var(--gold3),var(--gold2));color:#0a0300;box-shadow:0 4px 20px rgba(201,168,76,0.4);">حسناً يا بطل 👊</button>
  </div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="pw-pill freeze"><i class="fas fa-snowflake text-blue-400"></i><span id="inv-freeze">0</span></div>
    <div class="pw-pill fifty"><i class="fas fa-cut text-purple-400"></i><span id="inv-5050">0</span></div>
  </div>
  <button onclick="logoutUser()" class="logout-btn"><i class="fas fa-power-off" style="font-size:11px;"></i> خروج</button>
</div>

<!-- MAIN -->
<div id="main-ui" style="padding:16px;padding-top:80px;padding-bottom:112px;">

  <!-- PLAYER CARD -->
