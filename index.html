<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000008">
<link rel="apple-touch-icon" href="https://i.postimg.cc/QN7YYDZb/1772330473684.png">
<title>ملعب رمضان | الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{
  --g1:#C9A84C; --g2:#F0C96B; --g3:#7A4F10;
  --e1:#FF4500; --e2:#FF6B00;
  --bg:#000008;
}
*{box-sizing:border-box;margin:0;padding:0;cursor:none!important;}

/* ── CURSOR ── */
#CR{position:fixed;width:22px;height:22px;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform .1s;}
#CRR{position:fixed;width:44px;height:44px;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);border:1.5px solid rgba(201,168,76,.5);border-radius:50%;transition:all .12s ease;}

body{
  font-family:'Amiri','Cairo',serif;
  background:var(--bg);color:#fff;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}

/* ── CANVAS ── */
#BGC{position:fixed;inset:0;z-index:0;}

/* ── METEORS ── */
.mtr{
  position:fixed;width:2px;height:90px;
  background:linear-gradient(to bottom,transparent,rgba(201,168,76,.9),transparent);
  border-radius:100%;pointer-events:none;z-index:1;transform:rotate(15deg);
  animation:mtrF var(--d,4s) linear var(--dl,0s) infinite;
  top:var(--t,-8%);left:var(--l,50%);
}
@keyframes mtrF{
  0%{transform:translateY(-180px) translateX(0) rotate(15deg);opacity:0;}
  5%{opacity:1;}
  100%{transform:translateY(115vh) translateX(90px) rotate(15deg);opacity:0;}
}

/* ── FIRE PARTICLES ── */
.fp{
  position:fixed;border-radius:50%;pointer-events:none;z-index:2;bottom:0;
  left:var(--l,50%);width:var(--s,5px);height:var(--s,5px);
  background:radial-gradient(circle,#fff 0%,var(--e2) 40%,var(--e1) 80%,transparent 100%);
  animation:fpU var(--d,3s) ease-out var(--dl,0s) infinite;
}
@keyframes fpU{
  0%{transform:translateY(0) scale(1);opacity:.9;}
  50%{transform:translateY(-55vh) translateX(var(--x,20px)) scale(.5);opacity:.55;}
  100%{transform:translateY(-95vh) translateX(var(--x2,40px)) scale(.07);opacity:0;}
}

/* ── LANTERNS ── */
.lan{position:fixed;top:0;pointer-events:none;z-index:10;}
.lan.L{left:8px;transform-origin:top center;animation:swL 3.2s ease-in-out infinite;}
.lan.R{right:8px;transform-origin:top center;animation:swR 3.6s ease-in-out infinite;}
@keyframes swL{0%,100%{transform:rotate(9deg)}50%{transform:rotate(-9deg)}}
@keyframes swR{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(9deg)}}
.lw{width:1px;height:50px;background:linear-gradient(to bottom,rgba(201,168,76,.65),transparent);margin:0 auto;}
.lc{width:22px;height:7px;background:linear-gradient(180deg,var(--g2),var(--g3));border-radius:3px 3px 0 0;margin:0 auto;}
.lb{width:22px;height:34px;margin:0 auto;
  background:linear-gradient(180deg,rgba(255,220,100,.95),rgba(201,168,76,.7));
  border-radius:4px 4px 10px 10px;overflow:hidden;
  animation:lGl 2.5s ease-in-out infinite;}
.lb::before{content:'';display:block;height:100%;background:repeating-linear-gradient(90deg,transparent 0,transparent 3px,rgba(0,0,0,.1) 3px,rgba(0,0,0,.1) 4px);}
.lt{width:1px;height:10px;background:rgba(201,168,76,.4);margin:0 auto;}
@keyframes lGl{
  0%,100%{box-shadow:0 0 14px 5px rgba(255,180,0,.7),0 0 28px rgba(255,140,0,.4);}
  50%{box-shadow:0 0 22px 9px rgba(255,200,0,.95),0 0 50px rgba(255,100,0,.6);}
}

/* ── CARD ── */
.wrap{position:relative;z-index:20;width:100%;max-width:390px;padding:0 16px;}
.card{
  background:linear-gradient(160deg,rgba(18,8,2,.97),rgba(8,3,0,.99));
  border:1px solid rgba(201,168,76,.35);border-radius:28px;
  padding:40px 26px 36px;
  box-shadow:0 0 0 1px rgba(201,168,76,.04) inset,0 40px 100px rgba(0,0,0,.9),0 0 80px rgba(255,80,0,.07);
  position:relative;overflow:hidden;
  animation:cardIn .8s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes cardIn{from{transform:scale(.8) translateY(40px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.card::before{
  content:'';position:absolute;top:0;left:12%;right:12%;height:2px;
  background:linear-gradient(90deg,transparent,var(--g2),var(--e2),var(--g2),transparent);
  animation:topSh 3s ease-in-out infinite;
}
@keyframes topSh{0%,100%{opacity:.55;}50%{opacity:1;}}
.glow{position:absolute;pointer-events:none;border-radius:50%;}
.glow.a{top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,76,.1),transparent 70%);}
.glow.b{bottom:-50px;left:-50px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,69,0,.08),transparent 70%);}

/* ── LOGO ── */
.lz{display:flex;justify-content:center;margin-bottom:22px;}
.lo{position:relative;width:96px;height:96px;animation:lFlt 3s ease-in-out infinite;}
@keyframes lFlt{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.lo svg{position:absolute;inset:-6px;width:108px;height:108px;animation:lRot 4s linear infinite;}
@keyframes lRot{to{transform:rotate(360deg);}}
.li{width:96px;height:96px;border-radius:50%;overflow:hidden;background:#0a0300;border:2px solid rgba(201,168,76,.3);box-shadow:0 0 30px rgba(255,100,0,.3),0 0 60px rgba(201,168,76,.15);}
.li img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ldot{position:absolute;bottom:4px;right:4px;width:16px;height:16px;background:#22C55E;border-radius:50%;border:2px solid #000;box-shadow:0 0 8px rgba(34,197,94,.7);}

/* ── TITLE ── */
.ttl{
  font-family:'Amiri',serif;font-size:36px;font-weight:700;
  text-align:center;margin-bottom:4px;
  background:linear-gradient(135deg,#F0C96B 0%,#FF6B00 40%,#F0C96B 70%,#C9A84C 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200% auto;animation:ttlSh 3s linear infinite;
}
@keyframes ttlSh{to{background-position:200% center;}}
.sub{text-align:center;font-family:'Cairo',sans-serif;font-size:11px;color:rgba(201,168,76,.4);font-weight:700;letter-spacing:4px;margin-bottom:24px;}

/* ── DIVIDER ── */
.dv{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.dl{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.4));}
.dr{flex:1;height:1px;background:linear-gradient(to left,transparent,rgba(201,168,76,.4));}

/* ── INPUT ── */
.lbl{display:block;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;color:rgba(201,168,76,.55);letter-spacing:1px;margin-bottom:8px;}
.inp{
  width:100%;background:rgba(4,2,0,.8);border:1px solid rgba(201,168,76,.2);border-radius:14px;
  padding:15px 18px;color:var(--g2);font-family:'Cairo',sans-serif;
  font-size:20px;font-weight:900;text-align:center;letter-spacing:8px;outline:none;transition:all .3s;
}
.inp::placeholder{color:rgba(201,168,76,.2);letter-spacing:3px;font-size:14px;}
.inp:focus{border-color:rgba(201,168,76,.7);box-shadow:0 0 0 3px rgba(201,168,76,.08),0 0 30px rgba(201,168,76,.12);}

/* ── BUTTON ── */
.btn{
  width:100%;padding:16px;border:none;border-radius:14px;cursor:none;
  font-family:'Amiri',serif;font-size:20px;font-weight:700;
  position:relative;overflow:hidden;
  background:linear-gradient(90deg,#6B3D00,#C9A84C,#FF6B00,#F0C96B,#C9A84C,#6B3D00);
  background-size:300% 100%;color:#0a0300;
  box-shadow:0 4px 30px rgba(201,168,76,.4),0 0 60px rgba(255,69,0,.1);
  animation:btnF 4s linear infinite;transition:transform .2s,box-shadow .2s;
}
@keyframes btnF{to{background-position:-300% 0;}}
.btn:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 8px 40px rgba(201,168,76,.6);}
.btn:active{transform:scale(.98);}
.btn::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);animation:btnSw 2.5s ease-in-out infinite;}
@keyframes btnSw{0%{left:-100%;}60%,100%{left:150%;}}
.bw{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(255,200,0,.8),rgba(255,100,0,.8),transparent);animation:bwM 1.5s linear infinite;}
@keyframes bwM{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

/* ── ERROR ── */
.err{text-align:center;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;color:#F87171;margin-top:12px;display:none;animation:errSh .4s ease;}
@keyframes errSh{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

/* ── INSTALL ── */
#install-overlay{position:fixed;inset:0;background:rgba(0,0,8,.97);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(20px);}
.ic{background:linear-gradient(160deg,rgba(18,8,2,.97),rgba(8,3,0,.99));border:1px solid rgba(201,168,76,.4);border-radius:28px;padding:36px 26px;width:100%;max-width:360px;text-align:center;position:relative;overflow:hidden;box-shadow:0 0 100px rgba(255,80,0,.12),0 40px 80px rgba(0,0,0,.9);animation:cardIn .5s cubic-bezier(.175,.885,.32,1.275) both;}
.ic::before{content:'';position:absolute;top:0;left:12%;right:12%;height:2px;background:linear-gradient(90deg,transparent,var(--g2),var(--e2),var(--g2),transparent);}
.ib1{width:100%;padding:15px;border:none;border-radius:14px;cursor:none;font-family:'Amiri',serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,#064e3b,#10B981);color:#fff;margin-bottom:12px;box-shadow:0 4px 24px rgba(16,185,129,.4);transition:all .2s;}
.ib1:hover{transform:translateY(-2px);}
.ib2{color:rgba(255,255,255,.25);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;background:none;border:none;cursor:none;text-decoration:underline;transition:color .2s;}
.ib2:hover{color:rgba(255,255,255,.5);}
</style>
</head>
<body>

<div id="CR"><svg width="22" height="22" viewBox="0 0 22 22"><polygon points="11,1 13.2,7.8 20,7.8 14.4,12.2 16.6,19 11,14.6 5.4,19 7.6,12.2 2,7.8 8.8,7.8" fill="none" stroke="#F0C96B" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
<div id="CRR"></div>
<canvas id="BGC"></canvas>

<div class="mtr" style="--l:8%;--t:-5%;--d:4s;--dl:0s;"></div>
<div class="mtr" style="--l:23%;--t:-8%;--d:5.2s;--dl:1.2s;"></div>
<div class="mtr" style="--l:55%;--t:-4%;--d:3.5s;--dl:.5s;"></div>
<div class="mtr" style="--l:78%;--t:-10%;--d:4.5s;--dl:2s;"></div>
<div class="mtr" style="--l:40%;--t:-6%;--d:6s;--dl:.9s;"></div>
<div class="mtr" style="--l:93%;--t:-3%;--d:3.8s;--dl:1.7s;"></div>

<div class="fp" style="--l:10%;--s:5px;--d:3s;--dl:0s;--x:28px;--x2:55px;"></div>
<div class="fp" style="--l:28%;--s:7px;--d:2.5s;--dl:.5s;--x:-22px;--x2:-50px;"></div>
<div class="fp" style="--l:50%;--s:4px;--d:3.5s;--dl:1s;--x:35px;--x2:18px;"></div>
<div class="fp" style="--l:73%;--s:6px;--d:2.8s;--dl:.3s;--x:-28px;--x2:-58px;"></div>
<div class="fp" style="--l:90%;--s:5px;--d:4s;--dl:.8s;--x:18px;--x2:46px;"></div>
<div class="fp" style="--l:3%;--s:4px;--d:3.2s;--dl:1.4s;--x:14px;--x2:32px;"></div>

<div class="lan L"><div class="lw"></div><div class="lc"></div><div class="lb"></div><div class="lt"></div></div>
<div class="lan R"><div class="lw"></div><div class="lc"></div><div class="lb"></div><div class="lt"></div></div>

<div class="wrap" id="login-container">
  <div class="card">
    <div class="glow a"></div><div class="glow b"></div>
    <div class="lz">
      <div class="lo">
        <svg viewBox="0 0 108 108" fill="none"><circle cx="54" cy="54" r="50" stroke="url(#rg)" stroke-width="2" stroke-dasharray="8 4" stroke-linecap="round"/><defs><linearGradient id="rg" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#F0C96B"/><stop offset="40%" stop-color="#FF6B00"/><stop offset="80%" stop-color="#C9A84C"/><stop offset="100%" stop-color="#F0C96B"/></linearGradient></defs></svg>
        <div class="li"><img src="https://i.postimg.cc/QN7YYDZb/1772330473684.png" alt=""></div>
        <div class="ldot"></div>
      </div>
    </div>
    <h1 class="ttl">ملعب رمضان</h1>
    <p class="sub">✦ التحدي الأكبر ✦</p>
    <div class="dv"><div class="dl"></div><span style="color:rgba(255,107,0,.7);font-size:16px;">🔥</span><div class="dr"></div></div>
    <label class="lbl">🔑 كود الدخول</label>
    <input type="password" id="login-pass" class="inp" placeholder="• • • • • •" onkeydown="if(event.key==='Enter')loginUser()">
    <div style="margin-top:18px;">
      <button onclick="loginUser()" id="login-btn" class="btn"><div class="bw"></div>دخول الملعب ⚽</button>
    </div>
    <p id="error-msg" class="err"></p>
  </div>
</div>

<div id="install-overlay">
  <div class="ic">
    <div class="glow a"></div>
    <div class="lz" style="margin-bottom:14px;"><div class="lo"><div class="li"><img src="https://i.postimg.cc/QN7YYDZb/1772330473684.png" alt=""></div></div></div>
    <h2 style="font-family:'Amiri',serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;">ثبّت التطبيق! 🚀</h2>
    <p style="font-family:'Cairo',sans-serif;color:rgba(255,255,255,.4);font-size:13px;font-weight:700;margin-bottom:26px;line-height:1.8;">عشان تدخل الملعب علطول المرة الجاية<br>وتلعب بدون تقطيع</p>
    <button onclick="triggerInstall()" class="ib1">تثبيت الآن ✨</button><br>
    <button onclick="goToDashboard()" class="ib2">متابعة للموقع بدون تثبيت (مرة واحدة)</button>
  </div>
</div>

<script>
// ── CURSOR ──
const CR=document.getElementById('CR'),CRR=document.getElementById('CRR');
document.addEventListener('mousemove',e=>{CR.style.left=e.clientX+'px';CR.style.top=e.clientY+'px';CRR.style.left=e.clientX+'px';CRR.style.top=e.clientY+'px';});
document.addEventListener('mousedown',()=>{CR.style.transform='translate(-50%,-50%) scale(.65)';CRR.style.transform='translate(-50%,-50%) scale(1.5)';CRR.style.borderColor='rgba(255,107,0,.9)';});
document.addEventListener('mouseup',()=>{CR.style.transform='translate(-50%,-50%) scale(1)';CRR.style.transform='translate(-50%,-50%) scale(1)';CRR.style.borderColor='rgba(201,168,76,.5)';});

// ── CANVAS: STARS + MOON ──
const cv=document.getElementById('BGC'),cx=cv.getContext('2d');
function rsz(){cv.width=innerWidth;cv.height=innerHeight;}rsz();addEventListener('resize',rsz);
const stars=Array.from({length:200},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.6+.2,ph:Math.random()*Math.PI*2,sp:Math.random()*.012+.004,g:Math.random()>.8}));
function drawMoon(t){
  const mx=cv.width*.5,my=65,p=Math.sin(t*.4)*.06+1;
  cx.save();cx.shadowBlur=55+Math.sin(t*.4)*18;cx.shadowColor='rgba(201,168,76,.28)';
  const g=cx.createRadialGradient(mx-18,my-10,8,mx,my,85*p);g.addColorStop(0,'rgba(201,168,76,.07)');g.addColorStop(1,'transparent');
  cx.beginPath();cx.arc(mx,my,85*p,0,Math.PI*2);cx.fillStyle=g;cx.fill();
  cx.shadowBlur=18;cx.shadowColor='rgba(240,201,107,.55)';
  cx.beginPath();cx.arc(mx,my,52*p,Math.PI*.85,Math.PI*2.15);cx.strokeStyle='rgba(240,201,107,.18)';cx.lineWidth=1.5;cx.stroke();cx.restore();
}
function anim(ts){ts/=1000;cx.clearRect(0,0,cv.width,cv.height);
  const bg=cx.createRadialGradient(cv.width*.5,cv.height*.3,0,cv.width*.5,cv.height*.5,cv.height);
  bg.addColorStop(0,'rgba(18,5,0,.45)');bg.addColorStop(.5,'rgba(8,3,0,.6)');bg.addColorStop(1,'rgba(0,0,8,.8)');
  cx.fillStyle=bg;cx.fillRect(0,0,cv.width,cv.height);drawMoon(ts);
  stars.forEach(s=>{const op=.14+.7*Math.abs(Math.sin(ts*s.sp+s.ph));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=s.g?`rgba(201,168,76,${op})`:`rgba(255,255,255,${op})`;cx.fill();});
  requestAnimationFrame(anim);}
requestAnimationFrame(anim);

// ── SOUND ──
function snd(){try{const a=new(AudioContext||webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(780,a.currentTime);o.frequency.exponentialRampToValueAtTime(380,a.currentTime+.1);g.gain.setValueAtTime(.12,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.14);o.start();o.stop(a.currentTime+.14);}catch(e){}}
document.addEventListener('click',snd);

// ── BASIC PROTECTION ──
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.keyCode===123||(e.ctrlKey&&['u','i','j','c','s'].includes(e.key.toLowerCase()))){e.preventDefault();return false;}});
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
const firebaseConfig={apiKey:"AIzaSyBZMnIJ_IOqeAfXqFt-m4tM1Lvo0tUDnk8",projectId:"ramadan-87817",appId:"1:343525703258:web:6776b4857425df8bcca263"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const isApp=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
let deferredPrompt,userDataToSave=null;
addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
(function(){try{let s=localStorage.getItem('currentUser');if(s){let u=JSON.parse(s);if(u&&u.id){location.replace('dashboard.html');return;}}}catch(e){localStorage.removeItem('currentUser');}})();
onload=function(){let s=localStorage.getItem('savedUserPass');if(s)document.getElementById('login-pass').value=s;document.getElementById('login-pass').focus();};
function loginUser(){
  let p=document.getElementById('login-pass').value.trim();
  let err=document.getElementById('error-msg'),btn=document.getElementById('login-btn');
  if(!p){err.innerText='⚠️ اكتب الكود!';err.style.display='block';return;}
  btn.innerText='جاري التحقق...';err.style.display='none';
  db.collection('users').where('password','==',p).get().then(snap=>{
    if(snap.empty){err.innerText='❌ الكود خطأ!';err.style.display='block';btn.innerHTML='<div class="bw"></div>دخول الملعب ⚽';}
    else{
      let ud=snap.docs[0].data();ud.id=snap.docs[0].id;
      if(ud.isBanned){err.innerText='⛔ حسابك محظور!';err.style.display='block';btn.innerHTML='<div class="bw"></div>دخول الملعب ⚽';}
      else{
        userDataToSave=ud;localStorage.setItem('savedUserPass',p);localStorage.setItem('currentUser',JSON.stringify(userDataToSave));
        if(isApp){location.replace('dashboard.html');}
        else{document.getElementById('login-container').classList.add('hidden');let io=document.getElementById('install-overlay');io.style.display='flex';}
      }
    }
  }).catch(()=>{err.innerText='خطأ في الشبكة!';err.style.display='block';btn.innerHTML='<div class="bw"></div>دخول الملعب ⚽';});
}
function triggerInstall(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(r=>{if(r.outcome==='accepted')location.replace('dashboard.html');});}else location.replace('dashboard.html');}
function goToDashboard(){location.replace('dashboard.html');}
</script>
</body>
</html>
