<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ملعب رمضان | التحدي الأكبر</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="https://pl28752538.effectivegatecpm.com/c3/3c/34/c33c34082705fc844e7a83f1bbebcf42.js"></script>
    <script src="https://pl28773459.effectivegatecpm.com/0c/2e/75/0c2e7503a2abb6a631fb27fdf3b7ae02.js"></script>

    <script defer src="app.js?v=602"></script>
    <script defer src="quiz.js?v=602"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { 
            background-color: #0a0f1d; 
            background-image: 
                linear-gradient(to bottom, rgba(10, 15, 29, 0.85), rgba(3, 7, 18, 0.98)), 
                url('https://images.unsplash.com/photo-1585036156171-384164a8c675?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: white; 
            font-family: 'Cairo', sans-serif; 
            overflow-x: hidden; 
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.7); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            backdrop-filter: blur(16px); 
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.7); 
        }
        .tab-btn { transition: 0.4s; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { background: linear-gradient(90deg, #b8860b, #ffd700); color: #000; font-weight: 900; transform: scale(1.02); }
        .day-active { border: 2px solid #ffd700; background: linear-gradient(145deg, rgba(212,175,55,0.15), rgba(0,0,0,0.85)); animation: neonPulse 2s infinite; cursor: pointer; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        @keyframes neonPulse { 0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); } }
        
        .legendary-wheel { 
            background: conic-gradient(
                #064e3b 0deg 60deg,
                #78350f 60deg 120deg,
                #1e3a8a 120deg 180deg,
                #4c1d95 180deg 240deg,
                #7f1d1d 240deg 300deg,
                #0f172a 300deg 360deg
            ); 
            border-radius: 50%; 
            border: 8px solid #fbbf24; 
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.6), inset 0 0 40px rgba(0,0,0,0.9); 
        }
        .wheel-segment { position: absolute; width: 50%; height: 50%; transform-origin: bottom right; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fde68a; text-shadow: 2px 2px 5px rgba(0,0,0,1); font-size: 15px; }
        
        #quiz-overlay { position: fixed; inset: 0; background: rgba(3, 7, 18, 0.98); z-index: 2147483647 !important; display: none; align-items: center; justify-content: center; padding: 10px; }
        .quiz-box { width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; background: linear-gradient(145deg, #0f172a, #030712); border: 1px solid rgba(212, 175, 55, 0.5); border-radius: 20px; padding: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.9); scrollbar-width: none; }
        .quiz-box::-webkit-scrollbar { display: none; }
        
        .powerup-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; border: 2px solid #111827; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        body.hide-ads #main-ui, body.hide-ads iframe, body.hide-ads ins { display: none !important; }
        body.hide-ads { overflow: hidden !important; background: #030712 !important; }
    </style>
</head>
<body class="relative">

    <div id="custom-alert" class="fixed inset-0 bg-black/80 z-[999999] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="glass-card p-6 rounded-3xl w-full max-w-sm text-center transform scale-95 transition-transform" id="alert-box">
            <div id="alert-icon" class="text-5xl mb-4"></div>
            <h3 id="alert-title" class="text-2xl font-black text-white mb-2"></h3>
            <p id="alert-msg" class="text-gray-300 font-bold text-sm mb-6 leading-relaxed"></p>
            <button onclick="closeCustomAlert()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-black py-3 rounded-xl shadow-lg hover:scale-105 transition-all">حسناً يا بطل</button>
        </div>
    </div>

    <div class="fixed top-0 left-0 w-full z-[100] bg-gray-900/90 border-b border-gray-700 backdrop-blur-md px-4 py-2 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="bg-blue-900/50 border border-blue-500/50 px-3 py-1 rounded-full flex items-center gap-2">
                <i class="fas fa-snowflake text-blue-400"></i><span id="inv-freeze" class="text-white font-black text-sm">0</span>
            </div>
            <div class="bg-purple-900/50 border border-purple-500/50 px-3 py-1 rounded-full flex items-center gap-2">
                <i class="fas fa-cut text-purple-400"></i><span id="inv-5050" class="text-white font-black text-sm">0</span>
            </div>
        </div>
        <button onclick="logoutUser()" class="text-red-400 text-xs font-bold hover:text-red-300"><i class="fas fa-power-off"></i> خروج</button>
    </div>

    <div id="main-ui" class="p-4 pt-16 pb-24">
        <header class="glass-card p-4 rounded-3xl mb-6 max-w-lg mx-auto relative overflow-hidden border border-yellow-500/30">
            <div class="flex justify-between items-center gap-2">
                <div class="flex items-center gap-3 w-3/4 overflow-hidden">
                    <img src="https://i.postimg.cc/9Fpp5TVC/IMG-20260217-031514.png" class="w-14 h-14 rounded-xl border-2 border-yellow-500 object-cover">
                    <div class="flex flex-col overflow-hidden w-full">
                        <h2 id="p-name" class="font-black text-white text-base truncate">...</h2>
                        <span id="p-group" class="text-yellow-400 font-bold bg-gray-800 px-2 py-0.5 rounded text-[10px] border border-gray-600 truncate max-w-[120px]">...</span>
                    </div>
                </div>
                <div class="bg-gray-900/80 rounded-xl p-2 w-1/4 border border-gray-700 text-center">
                    <p class="text-[9px] text-gray-400 font-bold mb-0.5">نقاطك</p>
                    <p id="p-score" class="font-black text-xl text-yellow-400">0</p>
                </div>
            </div>
        </header>

        <div class="max-w-lg mx-auto mb-8 flex flex-col items-center justify-center">
            <div onclick="openSpinWheel()" class="relative cursor-pointer group hover:scale-105 transition-transform duration-300">
                <div class="w-20 h-20 rounded-full border-4 border-yellow-500 flex items-center justify-center bg-gray-800 shadow-[0_0_20px_rgba(212,175,55,0.4)] overflow-hidden">
                    <i class="fas fa-dharmachakra text-5xl text-yellow-400 group-hover:rotate-180 transition-transform duration-1000"></i>
                </div>
                <div id="streak-badge" class="absolute -top-2 -right-2 bg-red-500 text-white font-black text-xs px-2 py-1 rounded-full border-2 border-gray-900">0/3</div>
                <div class="absolute -bottom-3 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-yellow-600 to-yellow-500 px-3 py-1 rounded-full border border-yellow-700 text-xs font-black text-black whitespace-nowrap shadow-md">عجلة الهدايا</div>
            </div>
        </div>

        <div class="flex bg-gray-800/80 p-1.5 rounded-2xl mb-6 max-w-lg mx-auto border border-gray-700">
            <button onclick="showTab('arena')" id="btn-arena" class="tab-btn active flex-1 py-3 text-sm rounded-xl font-bold">الخريطة 🗺️</button>
            <button onclick="showTab('leaderboard')" id="btn-leader" class="tab-btn flex-1 py-3 text-sm rounded-xl font-bold">المجموعة 🏆</button>
        </div>

        <div id="view-arena" class="max-w-lg mx-auto space-y-4 pb-10"></div>
        <div id="view-leaderboard" class="max-w-lg mx-auto hidden pb-10">
            <div class="glass-card p-6 rounded-3xl">
                <h3 class="text-center text-white font-black mb-6 border-b border-gray-700 pb-3">ترتيب مجموعتك</h3>
                <div id="group-list" class="space-y-3"></div>
            </div>
        </div>
    </div> 

    <div id="quiz-overlay"><div class="quiz-box" id="quiz-content"></div></div>

    <div id="spin-overlay" class="fixed inset-0 bg-gray-900/95 z-[99999] hidden flex-col items-center justify-center p-4 backdrop-blur-md">
        <div class="glass-card p-6 rounded-3xl w-full max-w-sm text-center relative border-2 border-yellow-500 shadow-[0_0_50px_rgba(212,175,55,0.4)]">
            <button onclick="closeSpinWheel()" class="absolute top-3 left-4 text-gray-400 hover:text-white text-2xl font-black">&times;</button>
            <h2 class="text-3xl font-black text-yellow-400 mb-2 drop-shadow-md">عجلة الحظ 🎁</h2>
            <p class="text-gray-300 text-sm mb-6 font-bold">مكافأة أسطورية لالتزامك 3 أيام متتالية!</p>
            
            <div class="relative w-64 h-64 mx-auto mb-8">
                <div class="absolute -top-6 left-1/2 transform -translate-x-1/2 text-5xl text-white z-20 drop-shadow-[0_5px_10px_rgba(0,0,0,1)]"><i class="fas fa-caret-down"></i></div>
                <div id="wheel-spinner" class="legendary-wheel w-full h-full relative transition-transform duration-[4000ms] ease-out">
                    <div class="wheel-segment" style="top:0; right:0; transform: rotate(30deg) skewY(30deg);"><div style="transform: skewY(-30deg) rotate(-30deg) translateY(-50px);">+50💎</div></div>
                    <div class="wheel-segment" style="top:50%; right:0; transform: rotate(90deg) skewY(30deg);"><div style="transform: skewY(-30deg) rotate(-30deg) translateY(-50px);">✂️ إجابتين</div></div>
                    <div class="wheel-segment" style="top:50%; right:50%; transform: rotate(150deg) skewY(30deg);"><div style="transform: skewY(-30deg) rotate(-30deg) translateY(-50px);">+20🪙</div></div>
                    <div class="wheel-segment" style="top:0; right:50%; transform: rotate(210deg) skewY(30deg);"><div style="transform: skewY(-30deg) rotate(-30deg) translateY(-50px);">❄️ تجميد</div></div>
                    <div class="wheel-segment" style="top:-50%; right:50%; transform: rotate(270deg) skewY(30deg);"><div style="transform: skewY(-30deg) rotate(-30deg) translateY(-50px);">+10🪙</div></div>
                    <div class="wheel-segment" style="top:-50%; right:0; transform: rotate(330deg) skewY(30deg);"><div style="transform: skewY(-30deg) rotate(-30deg) translateY(-50px);">❌ حظ أوفر</div></div>
                </div>
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-gray-900 border-4 border-yellow-500 rounded-full z-10"></div>
            </div>
            
            <div id="wheel-controls" class="w-full">
            </div>
        </div>
    </div>
</body>
  </html>
